name: "Build LaTex Document"
on:
  push:
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/cache@v3
        name: Tectonic Cache
        with:
          path: ~/.cache/Tectonic
          key: ${{ runner.os }}-tectonic-${{ hashFiles('**/*.tex') }}
          restore-keys: |
            ${{ runner.os }}-tectonic-
      - uses: wtfjoke/setup-tectonic@v4
      - name: Run Tectonic
        run: tectonic paper/main.tex
      - name: Upload pdf
        uses: actions/upload-artifact@v7
        with:
          name: main
          path: main.pdf
